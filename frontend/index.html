<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | OAuth2 App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
    }

    .logo { font-size: 50px; margin-bottom: 14px; }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .error-box {
      display: none;
      background: #fff0f0;
      color: #e53e3e;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 13px;
      text-align: left;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }

    .btn-google:hover {
      border-color: #667eea;
      background: #f8f9ff;
      box-shadow: 0 4px 14px rgba(102,126,234,0.2);
      transform: translateY(-1px);
    }

    .btn-google:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .footer { color: #bbb; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔐</div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to continue to your dashboard</p>

    <div class="error-box" id="errorBox"></div>

    <button class="btn-google" id="loginBtn" onclick="loginWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 18 18">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.706 17.64 9.2z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <p class="footer">🔒 Secured with Google OAuth 2.0</p>
  </div>

  <script>
    var API = 'http://localhost:3001';

    // Show error from URL if any
    var params = new URLSearchParams(window.location.search);
    var err = params.get('error');
    if (err) {
      var box = document.getElementById('errorBox');
      box.style.display = 'block';
      box.textContent = '⚠️ Login failed: ' + err.replace(/_/g, ' ');
    }

    // Auto-redirect if already logged in
    fetch(API + '/auth/me', { credentials: 'include' })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.authenticated) window.location.href = '/profile.html';
      })
      .catch(function() {});

    function loginWithGoogle() {
      var btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Redirecting to Google...';
      window.location.href = API + '/auth/google';
    }
  </script>
</body>
</html>
